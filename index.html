        /* === Design Tokens (对齐知简) === */
        :root {
            --primary: #9f000f;
            --primary-hover: #c41e3a;
            --primary-foreground: #ffffff;
            --primary-subtle: rgba(159, 0, 15, 0.4);
            --foreground: #1d1b20;
            --muted-foreground: #6f655c;
            --background: #fbf9f9;
            --muted: #f6efe7;
            --border: #e7ddd1;
            --accent: #e6efe5;
            --selection: rgba(182, 72, 43, 0.18);
            --radius: 0;
            --font-serif: 'Noto Serif SC', 'Songti SC', 'STSong', Georgia, serif;
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif;
        }

        /* === Reset === */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        ::selection {
            background: var(--selection);
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--background);
            color: var(--foreground);
            line-height: 1.85;
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* === 导航栏 === */
        .nav {
            height: 4rem;
            border-bottom: 1px solid var(--border);
            background: var(--background);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 0.04em;
        }

        .nav-link {
            font-size: 0.875rem;
            color: var(--muted-foreground);
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: var(--muted);
        }

        .nav-link:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* === Hero 区域 === */
        .hero {
            max-width: 80rem;
            margin: 0 auto;
            padding: 4rem 1.5rem 3rem;
        }

        .hero-kicker {
            font-size: 0.6875rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-size: clamp(2.75rem, 6vw, 4.75rem);
            line-height: 1.2;
            letter-spacing: 0.04em;
            color: var(--foreground);
            margin-bottom: 1.25rem;
        }

        .hero-desc {
            font-size: 1.125rem;
            line-height: 1.85;
            color: var(--muted-foreground);
            max-width: 36rem;
            margin-bottom: 2rem;
        }

        .hero-cta {
            display: inline-block;
            background: var(--primary);
            color: var(--primary-foreground);
            padding: 0.625rem 1.5rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .hero-cta:hover {
            background: var(--primary-hover);
        }

        .hero-cta:active {
            transform: scale(0.98);
        }

        .hero-cta:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* === 示例区域 === */
        .examples {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
        }

        .category {
            margin-top: 3rem;
        }

        .category:first-child {

            font-size: 2rem;
            line-height: 1.3;

            color: var(--foreground);
            border-left: 4px solid var(--primary);
            padding-left: 1.5rem;
            margin-bottom: 1.25rem;

        /* === 卡片网格 === */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        /* === 卡片 === */
        .card {
            border: 1px solid var(--primary);
            border-radius: var(--radius);
            padding: 1.5rem;
            background: var(--background);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;

        .card:hover {
            border-color: var(--primary-subtle);
            transform: translateY(-2px);
        }

        .card:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;

        .card-kicker {

        <p class="hero-desc">
            基于 CesiumJS 的 3D 地球可视化示例集，以上海陆家嘴为主要场景，展示飞行航线、空域可视化、粒子特效和天气模拟等多种三维地图应用。

        <!-- 由 JS 动态渲染 -->

    <!-- 页脚 -->

        <p>© 2026 <a href="https://yuwb.cn" target="_blank" rel="noopener noreferrer">yuwb.cn</a> · Powered by <a href="https://cesium.com/" target="_blank" rel="noopener noreferrer">CesiumJS</a></p>
    </footer>

    <script src="./site.config.js"></script>
    <script>
        (function () {
            'use strict';

            // 按 categoryOrder 分组
            var categories = {};
            SITE_CONFIG.examples.forEach(function (ex) {
                if (!categories[ex.category]) {
                    categories[ex.category] = {
                        name: ex.category,
                        order: ex.categoryOrder,
                        items: []
                    };
                }
                categories[ex.category].items.push(ex);
            });

            // 排序
            var sorted = Object.values(categories).sort(function (a, b) {
                return a.order - b.order;
            });

            // 渲染
            var container = document.getElementById('examples');
            sorted.forEach(function (cat) {
                var section = document.createElement('div');
                section.className = 'category';

                var title = document.createElement('h2');
                title.className = 'category-title';
                title.textContent = cat.name;
                section.appendChild(title);

                var grid = document.createElement('div');
                grid.className = 'card-grid';

                cat.items.forEach(function (item) {
                    var card = document.createElement('a');
                    card.href = item.path;
                    card.className = 'card';
                    card.setAttribute('aria-label', item.title + ' - ' + item.description);

                    var kicker = document.createElement('div');
                    kicker.className = 'card-kicker';
                    kicker.textContent = cat.name;

                    var cardTitle = document.createElement('h3');
                    cardTitle.className = 'card-title';
                    cardTitle.textContent = item.title;

                    var desc = document.createElement('div');
                    desc.className = 'card-desc';
                    desc.textContent = item.description;

                    var tags = document.createElement('div');
                    tags.className = 'card-tags';
                    item.tags.forEach(function (tag) {
                        var span = document.createElement('span');
                        span.className = 'card-tag';
                        span.textContent = tag;
                        tags.appendChild(span);
                    });

                    card.appendChild(kicker);
                    card.appendChild(cardTitle);
                    card.appendChild(desc);
                    card.appendChild(tags);
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        })();
    </script>
</body>
