<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTOL 倾转旋翼机 | Cesium 三维地球示例集</title>
    <meta name="description" content="使用 Beta Alia VTOL 倾转旋翼机模型替换默认飞机">
    <meta name="keywords" content="Cesium, CesiumJS, VTOL, 倾转旋翼机, GLB, 飞行航线">
    <link rel="canonical" href="https://yuwb.cn/cesium/examples/01-flight-vtol/">
    <meta name="author" content="耶温">
    <link rel="icon" type="image/png" href="../../assets/icon.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "VTOL 倾转旋翼机",
      "description": "使用 Beta Alia VTOL 倾转旋翼机模型替换默认飞机",
      "url": "https://yuwb.cn/cesium/examples/01-flight-vtol/",
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "首页", "item": "https://yuwb.cn/cesium/" },
          { "@type": "ListItem", "position": 2, "name": "VTOL 倾转旋翼机" }
        ]
      }
    }
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="VTOL 倾转旋翼机 | Cesium 三维地球示例集">
    <meta property="og:description" content="使用 Beta Alia VTOL 倾转旋翼机模型替换默认飞机">
    <meta property="og:url" content="https://yuwb.cn/cesium/examples/01-flight-vtol/">
    <meta property="og:image" content="https://yuwb.cn/cesium/assets/home.png">
    <meta property="og:site_name" content="yuwb.cn">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VTOL 倾转旋翼机 | Cesium 三维地球示例集">
    <meta name="twitter:description" content="使用 Beta Alia VTOL 倾转旋翼机模型替换默认飞机">
    <meta name="twitter:image" content="https://yuwb.cn/cesium/assets/home.png">

    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Widgets/widgets.css">
    <link rel="stylesheet" href="../../shared/styles/flight-style.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="loading" class="loading">
        <span class="loading-spinner"></span>
        <span>LOADING...</span>
    </div>

    <!-- 飞行信息面板 -->
    <div id="flightInfo" class="flight-info">
        <div class="panel-header">
            <span class="panel-badge">✈</span>
            <h3 id="airplaneName">东方明珠圆角四边形环线 - VTOL</h3>
        </div>
        <div class="panel-section telemetry">
            <div class="info-row highlight">
                <span class="label">速度</span>
                <span class="value" id="speed">360 km/h</span>
            </div>
            <div class="info-row">
                <span class="label">高度</span>
                <span class="value" id="altitude">600 m</span>
            </div>
            <div class="info-row">
                <span class="label">航向</span>
                <span class="value" id="heading">0°</span>
            </div>
        </div>
        <div class="panel-section flight-details">
            <div class="info-row">
                <span class="label">起飞地</span>
                <span class="value" id="departure">东方明珠</span>
            </div>
            <div class="info-row">
                <span class="label">目的地</span>
                <span class="value" id="destination">环线巡航</span>
            </div>
            <div class="info-row">
                <span class="label">航班号</span>
                <span class="value" id="flightNo">E20</span>
            </div>
        </div>
        <div class="panel-section status-section">
            <div class="info-row">
                <span class="label"><span class="status-dot"></span> 系统状态</span>
                <span class="value" id="systemStatus">正常</span>
            </div>
        </div>
    </div>

    <!-- 相机跟随提示 -->
    <div id="cameraHint" class="camera-hint">
        <span class="lock-icon">🔒</span>
        <span class="hint-text">视角跟随中</span>
        <span class="hint-divider">|</span>
        <span class="hint-action">单击解锁</span>
    </div>

    <!-- 日夜切换按钮 -->
    <button id="btnSceneMode" class="scene-mode-btn">
        <span class="btn-icon">☀</span>
        <span class="btn-label">切换白天</span>
    </button>

    <div id="cesiumContainer"></div>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Cesium.js"></script>
    <!-- 共享模块 -->
    <script src="../../shared/config/constants.js"></script>
    <script src="../../shared/SceneManager.js"></script>
    <script src="../../shared/RoundedFlightPath.js"></script>
    <script src="../../shared/FlightTracker.js"></script>
    <!-- 主逻辑 -->
    <script src="./main.js"></script>
</body>
</html>
