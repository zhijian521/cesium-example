<body>
    <div id="loading" class="loading">
        <span class="loading-spinner"></span>
        <span>LOADING...</span>
    </div>

    <!-- 控制面板 -->
    <div class="control-panel">
        <div class="panel-header">
            <span class="panel-badge">✨</span>
            <h3>粒子特效</h3>
        </div>
        <div class="panel-section">
            <div class="control-item">
                <label for="effectSelect">效果</label>
                <select id="effectSelect">
                    <option value="flame" selected>火焰</option>
                    <option value="smoke">烟雾</option>
                    <option value="trail">气流</option>
                    <option value="none">关闭</option>
                </select>
            </div>
            <div class="control-item">
                <label for="intensityRange">强度</label>
                <input id="intensityRange" type="range" min="0.6" max="2" step="0.1" value="1">
                <span id="intensityValue">1.0倍</span>
            </div>
            <div class="control-hint">
                单击飞机切换焦点，双击锁定相机。
            </div>
        </div>
    </div>

    <!-- 飞行信息面板 -->
    <div id="flightInfo" class="flight-info">
        <div class="panel-header">
            <span class="panel-badge">✈</span>
            <h3 id="airplaneName">飞机</h3>
        </div>
        <div class="panel-section telemetry">
            <div class="info-row highlight">
                <span class="label">速度</span>
                <span class="value" id="speed">0 km/h</span>
            </div>
            <div class="info-row">
                <span class="label">高度</span>
                <span class="value" id="altitude">0 m</span>
            </div>
            <div class="info-row">
                <span class="label">航向</span>
                <span class="value" id="heading">0°</span>
            </div>
        </div>
    </div>

    <!-- 相机跟随提示 -->
    <div id="cameraHint" class="camera-hint">
        <span class="lock-icon">🔒</span>
        <span class="hint-text">视角跟随中</span>
        <span class="hint-divider">|</span>
        <span class="hint-action">单击解锁</span>
    </div>

    <!-- 日夜切换按钮 -->
    <button id="btnSceneMode" class="scene-mode-btn">
        <span class="btn-icon">☀</span>
        <span class="btn-label">切换白天</span>
    </button>

    <div id="cesiumContainer"></div>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Cesium.js"></script>
    <script src="../../shared/config/constants.js"></script>
    <script src="../../shared/SceneManager.js"></script>
    <script src="./main.js"></script>
    <script async src="https://yuwb.dev/script.js" data-site-id="vba8r925"></script>
</body>
</html>
