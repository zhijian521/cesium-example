    const entityAnimationState = {};

    function normalizeModelUri(modelUri) {
        if (!modelUri) {
            return '/GisMap/' + defaultModelMap.default;
        }
        if (/^(https?:)?\/\//.test(modelUri) || modelUri.startsWith('/')) {
            return modelUri;
        }
        return '/GisMap/' + modelUri.replace(/^\.?\//, '');
    }

    function getModelUri(aircraftType) {
        const config = window.GIS_MAP_MODEL_CONFIG || {};
        const models = config.models || {};
        const typeKey = String(aircraftType);
        const defaultTypeKey = String(config.defaultType || '');
        const modelUri =
            models[typeKey] ||
            models[defaultTypeKey] ||
            defaultModelMap[typeKey] ||
            defaultModelMap.default;

        return normalizeModelUri(modelUri);
    }

    function resolveAnimationSpeed(aircraftType) {
        const config = window.GIS_MAP_MODEL_CONFIG || {};
        const animationSpeed = config.animationSpeed || {};
        const speed = Number(animationSpeed[String(aircraftType)]);

        return Number.isFinite(speed) && speed > 0 ? speed : 1;
    }

    function shouldUseCustomAnimationSpeed(aircraftType) {
        return resolveAnimationSpeed(aircraftType) !== 1;
    }

    function getEntityModelState(entity) {
        if (!viewer || !viewer.dataSourceDisplay || !entity) {
            return null;
        }

        const dataSource = viewer.dataSourceDisplay.defaultDataSource;
        const visualizers = dataSource && dataSource._visualizers;
        if (!Array.isArray(visualizers)) {
            return null;
        }

        for (let i = 0; i < visualizers.length; i++) {
            const visualizer = visualizers[i];
            if (!visualizer || !visualizer._modelHash) {
                continue;
            }

            const modelState = visualizer._modelHash[entity.id];
            if (modelState) {
                return modelState;
            }
        }

        return null;
    }

    function syncEntityAnimation(entity, aircraftType, engineRun) {
        const shouldRun = Number(engineRun) === 1;
        const animationSpeed = resolveAnimationSpeed(aircraftType);

        if (animationSpeed === 1) {
            entity.model.runAnimations = shouldRun;
            delete entityAnimationState[entity.id];
            return;
        }

        entity.model.runAnimations = false;

        const modelState = getEntityModelState(entity);
        const modelPrimitive = modelState && modelState.modelPrimitive;
        if (!modelPrimitive || !modelPrimitive.ready || !modelPrimitive.activeAnimations) {
            return;
        }

        const runtimeState = entityAnimationState[entity.id] || {
            running: false,
            speed: animationSpeed,
        };
        const speedChanged = runtimeState.speed !== animationSpeed;

        if (shouldRun) {
            if (!runtimeState.running || speedChanged) {
                modelPrimitive.activeAnimations.removeAll();
                modelPrimitive.activeAnimations.addAll({
                    loop: Cesium.ModelAnimationLoop.REPEAT,
                    multiplier: animationSpeed,
                });
                runtimeState.running = true;
                runtimeState.speed = animationSpeed;
                entityAnimationState[entity.id] = runtimeState;
            }
            return;
        }

        if (runtimeState.running) {
            modelPrimitive.activeAnimations.removeAll();
        }
        runtimeState.running = false;
        runtimeState.speed = animationSpeed;
        entityAnimationState[entity.id] = runtimeState;
    }

    /**
     * 加载世界地形（兼容版本，失败不影响其他功能）
     * @param {Cesium.Viewer} viewer - Cesium 视图对象
     */
    function loadTerrain(viewer) {
        try {
            // 兼容 Cesium 1.103 版本的 API
            if (typeof Cesium.createWorldTerrainAsync === 'function') {
                // Cesium 1.110+ 版本
                Cesium.createWorldTerrainAsync().then(function (terrainProvider) {
                    try {
                        viewer.terrainProvider = terrainProvider;
                        console.log('世界地形已加载');
                    } catch (e) {
                        console.warn('设置地形提供者失败，使用默认椭球地形:', e);
                        viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
                    }
                }).catch(function (error) {
                    console.warn('无法加载世界地形，使用默认椭球地形:', error);
                    try {
                        viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
                    } catch (e) {
                        console.error('无法设置默认地形:', e);
                    }
                });
            } else if (typeof Cesium.createWorldTerrain === 'function') {
                // Cesium 1.103 版本可能使用同步方法
                try {
                    viewer.terrainProvider = Cesium.createWorldTerrain();
                    console.log('世界地形已加载');
                } catch (error) {
                    console.warn('无法加载世界地形，使用默认椭球地形:', error);
                    viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
                }
            } else {
                // 使用 Ion 资源加载地形
                Cesium.IonResource.fromAssetId(1).then(function (resource) {
                    try {
                        viewer.terrainProvider = new Cesium.CesiumTerrainProvider({
                            url: resource
                        });
                        console.log('世界地形已加载');
                    } catch (e) {
                        console.warn('创建地形提供者失败，使用默认椭球地形:', e);
                        viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
                    }
                }).catch(function (error) {
                    console.warn('无法加载世界地形，使用默认椭球地形:', error);
                    try {
                        viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
                    } catch (e) {
                        console.error('无法设置默认地形:', e);
                    }
                });
            }
        } catch (error) {
            console.error('加载地形时发生未预期的错误:', error);
            // 确保即使出错也有默认地形
            try {
                if (!viewer.terrainProvider) {
                    viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();
                }
            } catch (e) {
                console.error('无法设置默认地形:', e);
            }
        }
    }

    // 加载3D建筑另一种方法（兼容版本，失败不影响其他功能）
    function load3DBuildings(viewer, options) {
        options = options || {};

        try {
            // 检查必要的 API 是否存在
            if (typeof Cesium.createOsmBuildings !== 'function') {
                console.warn('Cesium.createOsmBuildings 不可用，跳过 3D 建筑加载');
                if (options.onError) {
                    options.onError(new Error('createOsmBuildings API 不可用'));
                }
                return;
            }

            try {
                const tileset = viewer.scene.primitives.add(
                    Cesium.createOsmBuildings({
                        customShader: new Cesium.CustomShader({
                            uniforms: {
                                u_envTexture: {
                                    type: Cesium.UniformType.SAMPLER_2D,
                                    value: new Cesium.TextureUniform({
                                        url: "images/sky.jpg"
                                    })
                                },
                                u_envTexture2: {
                                    type: Cesium.UniformType.SAMPLER_2D,
                                    value: new Cesium.TextureUniform({
                                        url: "images/pic.jpg"
                                    })
                                },
                                u_isDark: {
                                    type: Cesium.UniformType.BOOL,
                                    value: false
                                }
                            },
                            mode: Cesium.CustomShaderMode.REPLACE_MATERIAL,
                            lightingModel: Cesium.LightingModel.UNLIT,
                            fragmentShaderText: `

                                void fragmentMain(FragmentInput fsInput, inout czm_modelMaterial material) {
                                    vec3 positionMC = fsInput.attributes.positionMC;
                                    vec3 positionEC = fsInput.attributes.positionEC;
                                    vec3 normalEC = fsInput.attributes.normalEC;
                                    vec3 posToCamera = normalize(-positionEC);
                                    vec3 coord = normalize(vec3(czm_inverseViewRotation * reflect(posToCamera, normalEC)));
                                    float ambientCoefficient = 0.3;
                                    float diffuseCoefficient = max(0.0, dot(normalEC, czm_sunDirectionEC) * 1.0);

                                    if (!u_isDark) {
                                        vec4 darkRefColor = texture(u_envTexture2, vec2(coord.x, (coord.z - coord.y) / 2.0));
                                        material.diffuse = mix(mix(vec3(0.2), vec3(0.1, 0.2, 0.4), clamp(positionMC.z / 200., 0.0, 1.0)), darkRefColor.rgb, 0.3);
                                        // 适度提高基础亮度，从 0.2 提高到 0.35，避免太黑但保持渐变
                                        material.diffuse *= 0.35;

                                        float _baseHeight = -40.0;
                                        float _heightRange = 20.0;
                                        float _glowRange = 300.0;

                                        float czm_height = positionMC.z - _baseHeight;
                                        float czm_a11 = fract(czm_frameNumber / 120.0) * 3.14159265 * 2.0;
                                        // 保持原有的渐变计算，但确保最小值不会太低
                                        float czm_a12 = czm_height / _heightRange + sin(czm_a11) * 0.1;
                                        // 只限制最小值，保持最大值和渐变效果
                                        czm_a12 = max(czm_a12, 0.2);

                                        float times = czm_frameNumber / 60.0;
                                        material.diffuse *= vec3(czm_a12);

                                        float time = fract(czm_frameNumber / 360.0);
                                        time = abs(time - 0.5) * 2.0;
                                        float czm_h = clamp(czm_height / _glowRange, 0.0, 1.0);
                                        float czm_diff = step(0.005, abs(czm_h - time));
                                        material.diffuse += material.diffuse * (1.0 - czm_diff);

                                        // 设置最小和最大亮度限制，保持渐变效果
                                        // 最小亮度：避免大黑块
                                        material.diffuse = max(material.diffuse, vec3(0.10));
                                        // 最大亮度：避免过亮，保持视觉舒适
                                        material.diffuse = min(material.diffuse, vec3(0.80));
                                    } else {
                                        vec4 darkRefColor = texture(u_envTexture, vec2(coord.x, (coord.z - coord.y) / 3.0));
                                        material.diffuse = mix(mix(vec3(0.000), vec3(0.5), clamp(positionMC.z / 300., 0.0, 1.0)), darkRefColor.rgb, 0.3);
                                        material.diffuse *= min(diffuseCoefficient + ambientCoefficient, 1.0);
                                    }
                                    material.alpha = 1.0;
                                }
                        `
                        }),
                    })
                );

                console.log('3D 建筑模型已加载（load3DBuildings2）');

                if (options.onSuccess) {
                    options.onSuccess(tileset);
                }
            } catch (error) {
                console.error('创建 3D 建筑 tileset 失败:', error);
                if (options.onError) {
                    options.onError(error);
                }
            }
        } catch (error) {
            console.error('加载 3D 建筑时发生未预期的错误:', error);
            if (options.onError) {
                options.onError(error);
            }
        }
    }

    //处理websocket飞机数据
    function processPlane(data) {
        let insertTime = Cesium.JulianDate.fromDate(new Date(), new Cesium.JulianDate());
        insertTime = Cesium.JulianDate.addSeconds(insertTime, 2, new Cesium.JulianDate());
        let position = Cesium.Cartesian3.fromDegreesArrayHeights([parseFloat(data.longitude), parseFloat(data.latitude), parseFloat(data.altitude)]);
        let yawPitchRoll = Cesium.HeadingPitchRoll.fromDegrees(parseFloat(data.heading), parseFloat(data.pitch), parseFloat(data.roll));
        let entity = viewer.entities.getById("evtol_" + data.flightCode);
        if (Cesium.defined(entity)) {
            entity.position.addSample(insertTime, position[0]);
        } else {
            //机型
            let aircraftType = data.aircraftType;
            let modelUri = getModelUri(aircraftType);

            let labelShow = true;
            if (aircraftType == "10" || aircraftType == "11") {
                labelShow = false;
            }

            let property = new Cesium.SampledPositionProperty();
            for (let i = 0; i < position.length; i++) {
                property.addSample(insertTime, position[i]);
            }
            entity = viewer.entities.add({
                id: "evtol_" + data.flightCode,
                position: property,
                orientation: new Cesium.VelocityOrientationProperty(property),
                model: {
                    uri: modelUri,
                    minimumPixelSize: 64,
                    articulations: {
                        'E20_Luoxuanjiang Angle': 0,//E20
                        'E20_L_Door Open': 0,
                        'E20_R_Door Open': 0,
                        'WW_FQiluojia Open': 0,//白鲸前起落架
                        'WW_LQiluojia Open': 0,//白鲸后左起落架
                        'WW_RQiluojia Open': 0,//白鲸后右起落架
                        'WW_Qiluojia_L_Door Open': 0,
                        'WW_Qiluojia_R_Door Open': 0,
                        'WW_L_Door Open': 0,
                        'WW_R_Door Open': 0,
                        'WW_M_Door Open': 0,
                        'W_Door Open': 0//沃兰特门，前后推拉门
                    },
                    runAnimations: false
                },
                path: {
                    show: true,
                    width: 6,
                    leadTime: 0,
                    trailTime: 12000,
                    material: new Cesium.PolylineGlowMaterialProperty({
                        glowPower: 0.3,
                        taperPower: 0.3,
                        color: Cesium.Color.fromAlpha(Cesium.Color["GREEN"], 1.0)
                    }),
                },
                label: {
                    show: labelShow,
                    text: data.flightCode + "\n",
                    font: "12px sans-serif",
                    fillColor: Cesium.Color.WHITE,
                    showBackground: true,
                    backgroundColor: Cesium.Color.RED.withAlpha(0.5),
                    eyeOffset: new Cesium.Cartesian3(0.0, 0.0, 10.0),
                    horizontalOrigin: Cesium.HorizontalOrigin.LEFT,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM
                },
                properties: {
                    "offsetx": 20.0,
                    "offsety": 20.0,
                    "isSampleLabel": true,
                    "flightCode": data.flightCode,
                    "aircraftId": data.aircraftId,
                    "planId": data.planId,
                    "routesId": data.routesId,
                    "yaw": new Cesium.SampledProperty(Number),
                    "pitch": new Cesium.SampledProperty(Number),
                    "roll": new Cesium.SampledProperty(Number),
                    "velocity": new Cesium.SampledProperty(Number),
                    "aircraftType": new Cesium.SampledProperty(Number),
                    "engineRun": new Cesium.SampledProperty(Number),//螺旋桨转动
                    "engineAngle": new Cesium.SampledProperty(Number),//螺旋桨角度
                    "landingGear": new Cesium.SampledProperty(Number),//起落架收放
                    "E20_doorAngle": new Cesium.SampledProperty(Number),//舱门角度
                    "W500_Middle_doorAngle": new Cesium.SampledProperty(Number),//舱门角度
                    "W500_R_backdoorAngle": new Cesium.SampledProperty(Number),//舱门角度
                    "WLT_doorAngle": new Cesium.SampledProperty(Number),//舱门角度
                    "alarm": new Cesium.SampledProperty(Number),//预警
                }
            });
            if ((aircraftType == "10" || aircraftType == "11") && !shouldUseCustomAnimationSpeed(aircraftType)) {
                entity.model.runAnimations = true;
            }
        }
        entity.properties.yaw.addSample(insertTime, yawPitchRoll.heading);
        entity.properties.pitch.addSample(insertTime, yawPitchRoll.pitch);
        entity.properties.roll.addSample(insertTime, yawPitchRoll.roll);
        entity.properties.velocity.addSample(insertTime, parseFloat(data.speed));
        entity.properties.aircraftType.addSample(insertTime, parseInt(data.aircraftType));
        entity.properties.engineRun.addSample(insertTime, parseFloat(data.propellerState));//螺旋桨旋转 0不转 1转
        entity.properties.engineAngle.addSample(insertTime, parseFloat(data.nta));//螺旋桨角度
        //舱门开闭 0闭 1开
        //data.doorState = 0 ;
        if (data.doorState == 0) {
            entity.properties.E20_doorAngle.addSample(insertTime, 0);
            entity.properties.W500_Middle_doorAngle.addSample(insertTime, 0);
            entity.properties.W500_R_backdoorAngle.addSample(insertTime, 0);
            entity.properties.WLT_doorAngle.addSample(insertTime, 0);
        }
        if (data.doorState == 1) {
            entity.properties.E20_doorAngle.addSample(insertTime, 90);
            entity.properties.W500_Middle_doorAngle.addSample(insertTime, 10);
            entity.properties.W500_R_backdoorAngle.addSample(insertTime, 170);
            entity.properties.WLT_doorAngle.addSample(insertTime, 90);
        }
        //起落架收放 0收 1放
        //data.landingGear = 0 ;
        if (data.landingGear == 0) {
            entity.properties.landingGear.addSample(insertTime, 90);
        }
        if (data.landingGear == 1) {
            entity.properties.landingGear.addSample(insertTime, 0);
        }

    }

    function legacyGetModelUri(aircraftType) {
        var modelUri = "model/shidi03/shidi_Animi.gltf";
        switch (aircraftType) {
            case 1:
                modelUri = "model/baijing/white_whale.gltf";
                break;
            case 2:
                modelUri = "model/shidi03/shidi_Animi.gltf";
                break;
            case 3:
                modelUri = "model/wolant/wolante.gltf";
                break;
            default:
                modelUri = "model/shidi03/shidi_Animi.gltf";
                break;
        }
        return modelUri;
    }

    // 标牌拖动
    function initHandler() {
        var _labelHandle = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        _labelHandle.setInputAction(function (e) {
            var pick = viewer.scene.pick(e.position);
            if (Cesium.defined(pick) && Cesium.defined(pick.id) && pick.id.id.startsWith("evtol")) {
                _labelHandle.inableDrag = true;
                _labelHandle.selectedEntity = pick.id;
                viewer.scene.screenSpaceCameraController.enableRotate = false;
                viewer.scene.screenSpaceCameraController.enableTranslate = false;
                viewer.scene.screenSpaceCameraController.enableZoom = false;
                viewer.scene.screenSpaceCameraController.enableTilt = false;
            }
        }, Cesium.ScreenSpaceEventType.LEFT_DOWN);

        // LEFT_UP
        _labelHandle.setInputAction(function (e) {
            _labelHandle.inableDrag = false;
            viewer.scene.screenSpaceCameraController.enableRotate = true;
            viewer.scene.screenSpaceCameraController.enableTranslate = true;
            viewer.scene.screenSpaceCameraController.enableZoom = true;
            viewer.scene.screenSpaceCameraController.enableTilt = true;
        }, Cesium.ScreenSpaceEventType.LEFT_UP);

        // MOUSE_MOVE
        _labelHandle.setInputAction(function (e) {
            if (_labelHandle.inableDrag) {
                var startPosition = e.startPosition;
                var endPosition = e.endPosition;
                _labelHandle.selectedEntity.properties.offsetx -= (startPosition.x - endPosition.x);
                _labelHandle.selectedEntity.properties.offsety += (startPosition.y - endPosition.y);
            }
        }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

        // LEFT_DOUBLE_CLICK
        _labelHandle.setInputAction(function (e) {
            var pick = viewer.scene.pick(e.position);
            if (Cesium.defined(pick) && Cesium.defined(pick.id)) {
                if (Cesium.defined(pick) && Cesium.defined(pick.id) && pick.id.id.startsWith("evtol")) {
                    var _selectedEntity = pick.id;
                    var position = _selectedEntity.position.getValue(viewer.clock.currentTime);
                    var offsetx = _selectedEntity.properties.offsetx;
                    var offsety = _selectedEntity.properties.offsety;
                    if (position) {
                        var screen = Cesium.SceneTransforms.wgs84ToWindowCoordinates(viewer.scene, position);
                        if (e.position.x >= screen.x + offsetx && e.position.y <= screen.y - offsety) {
                            _selectedEntity.properties.isSampleLabel = !_selectedEntity.properties.isSampleLabel.getValue();
                        }
                    }
                }
            }
        }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);
    }

    function updateLabelLine(id, positions, color) {
        let _labelLine = viewer.entities.getById("labelLine-" + id);
        if (_labelLine) {
            _labelLine.polyline.positions = new Cesium.CallbackProperty(function (time, result) {
                return positions
            }, false)
        } else {
            viewer.entities.add({
                id: "labelLine-" + id,
                polyline: {
                    positions: new Cesium.CallbackProperty(function (time, result) {
                        return positions
                    }, false),
                    width: 1,
                    material: new Cesium.Color(color.getValue().red, color.getValue().green, color.getValue().blue, 0.5),
                    distanceDisplayCondition: new Cesium.DistanceDisplayCondition(5000.0, 2000000.0)
                }
            })
        }
    }
